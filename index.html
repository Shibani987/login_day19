<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Login Page</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="login-stage" aria-label="Login page">
      <div class="visual-panel">
        <div class="orbit orbit-one"></div>
        <div class="orbit orbit-two"></div>
        <div class="glass-pill pill-one">Secure access</div>
        <div class="glass-pill pill-two">Fast sign in</div>
        <div class="brand-mark" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="hero-copy">
          <p class="eyebrow">Welcome Back</p>
          <h1>Sign in to your workspace.</h1>
          <p>Clean, animated, and responsive login experience built with HTML, CSS, and JavaScript.</p>
        </div>
      </div>

      <form class="login-card" id="loginForm">
        <div class="form-header">
          <p class="eyebrow">Member Login</p>
          <h2>Hello again</h2>
          <p>Enter your details to continue.</p>
        </div>

        <label class="field">
          <span>Email address</span>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>
        </label>

        <label class="field">
          <span>Password</span>
          <div class="password-wrap">
            <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" minlength="6" required>
            <button type="button" class="icon-btn" id="togglePassword" aria-label="Show password">
              <span class="eye"></span>
            </button>
          </div>
        </label>

        <div class="form-row">
          <label class="remember">
            <input type="checkbox" checked>
            <span>Remember me</span>
          </label>
          <a href="#">Forgot password?</a>
        </div>

        <button type="submit" class="submit-btn">
          <span>Login</span>
          <span class="arrow">→</span>
        </button>

        <p class="signup-text">New here? <a href="#">Create an account</a></p>
        <p class="message" id="message" role="status" aria-live="polite"></p>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
